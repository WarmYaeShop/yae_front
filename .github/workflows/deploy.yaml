name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            "${GITHUB_WORKSPACE}/" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/yae_front"