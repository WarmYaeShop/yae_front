<html lang="ru">
<head>

        .nf-code { font-size: clamp(90px, 22vw, 170px); font-weight: bold; line-height: 1; background: linear-gradient(90deg, #ff7eb3, #ff4dff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 40px rgba(255,126,179,0.3); }
        .nf h1 { color: #fff; margin: 10px 0 6px; font-size: 26px; }
        .nf p { color: #a097b0; margin-bottom: 28px; font-size: 15px; }
        .nf a { background: linear-gradient(90deg, #ff4dff, #b300b3); color: #fff; text-decoration: none; padding: 14px 28px; border-radius: 12px; font-weight: bold; box-shadow: 0 6px 18px rgba(179,0,179,0.3); transition: 0.25s; }
        .nf a:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(179,0,179,0.45); }
    </style>
</head>
